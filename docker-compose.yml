services:
  finance:
    build: .
    image: finance-dash:latest
    container_name: finance-dash
    restart: unless-stopped
    ports:
      - "${PORT:-8090}:${PORT:-8090}"
    env_file:
      - .env
    environment:
      DB_PATH: /data/finance.db
      NODE_ENV: production
    volumes:
      - ./data:/data
